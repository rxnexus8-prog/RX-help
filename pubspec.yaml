name: r4x_help
description: R4X Help - Private calling app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.4
  flutter_webrtc: ^0.9.47
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  uuid: ^4.3.3
  share_plus: ^7.2.2
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.5
  flutter_animate: ^4.5.0
  vibration: ^1.8.4
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
